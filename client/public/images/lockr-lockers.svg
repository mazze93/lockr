<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 864" role="img" aria-labelledby="title desc">
  <title id="title">LOCKR locker room artwork</title>
  <desc id="desc">Stylized locker room illustration with glowing LOCKR text and padlocks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="locker" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e4a5f"/>
      <stop offset="100%" stop-color="#223447"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6ee7ff"/>
      <stop offset="100%" stop-color="#9ef9ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1536" height="864" fill="url(#bg)"/>

  <g opacity="0.95">
    <rect x="100" y="130" width="480" height="620" rx="16" fill="url(#locker)" stroke="#4b6b84"/>
    <rect x="640" y="200" width="800" height="530" rx="16" fill="url(#locker)" stroke="#4b6b84"/>
  </g>

  <g stroke="#9ca3af" opacity="0.35">
    <line x1="170" y1="130" x2="170" y2="750"/>
    <line x1="250" y1="130" x2="250" y2="750"/>
    <line x1="330" y1="130" x2="330" y2="750"/>
    <line x1="410" y1="130" x2="410" y2="750"/>
    <line x1="490" y1="130" x2="490" y2="750"/>
    <line x1="715" y1="200" x2="715" y2="730"/>
    <line x1="790" y1="200" x2="790" y2="730"/>
    <line x1="865" y1="200" x2="865" y2="730"/>
    <line x1="940" y1="200" x2="940" y2="730"/>
    <line x1="1015" y1="200" x2="1015" y2="730"/>
    <line x1="1090" y1="200" x2="1090" y2="730"/>
    <line x1="1165" y1="200" x2="1165" y2="730"/>
    <line x1="1240" y1="200" x2="1240" y2="730"/>
    <line x1="1315" y1="200" x2="1315" y2="730"/>
  </g>

  <g fill="#fbbf24" opacity="0.85">
    <rect x="154" y="500" width="22" height="30" rx="6"/>
    <rect x="296" y="418" width="22" height="30" rx="6"/>
    <rect x="452" y="640" width="22" height="30" rx="6"/>
    <rect x="726" y="520" width="20" height="28" rx="5"/>
    <rect x="878" y="610" width="20" height="28" rx="5"/>
    <rect x="1030" y="430" width="20" height="28" rx="5"/>
    <rect x="1182" y="565" width="20" height="28" rx="5"/>
    <rect x="1334" y="480" width="20" height="28" rx="5"/>
  </g>

  <g filter="url(#glow)">
    <text x="770" y="480" text-anchor="middle" font-size="146" font-family="Inter, Arial, sans-serif" font-weight="700" fill="url(#neon)">
      LOCKR
    </text>
  </g>
</svg>
